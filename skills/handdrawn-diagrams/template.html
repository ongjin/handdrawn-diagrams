<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js"></script>
<!--
  Handdrawn (Excalidraw) diagram template.  Usage:
    1) Copy:    cp template.html mydiagram.html
    2) Canvas:  adjust the <svg> below — width/height/viewBox — to fit your diagram
    3) Draw:    redraw only the "replace below" block inside draw() — don't touch KIT/PALETTE/font-wait
    4) Render:  node render.mjs mydiagram.html        (dark: node render.mjs mydiagram.html --dark)
  Helper API:  box · frame · cylinder(DB) · diamond(branch) · ellipse(node) · arrow · biArrow · curveArrow · line · txt · xmark · crossOut
  Palette:     use the PALETTE.{yellow,blue,green,orange,red} presets, or pass any hex directly.
  Dark mode:   --dark (?mode=dark) → switches free text · arrows · frames · background to dark (box pastels & labels are shared). Only when you need both light/dark sheets.
  Layout refs (copy-paste):  before/after split = examples/before-after.html,  layered architecture = examples/layered-arch.html
  Note: Korean / CJK labels render fine — the handwriting font (Nanum Pen Script) covers them. Just type them in draw().
-->
<style>
  html,body{margin:0;padding:0;}
  svg{display:block;}
</style>
</head>
<body>
<!-- ============ CONFIG: adjust only the canvas size here ============ -->
<svg id="c" width="1120" height="720" viewBox="0 0 1120 720" xmlns="http://www.w3.org/2000/svg"></svg>
<div id="flag" style="font-family:'Nanum Pen Script';position:absolute;left:-9999px;">loading</div>
<script>
const svgns="http://www.w3.org/2000/svg";
const svg=document.getElementById("c");
let rc;

/* ============ PALETTE (Excalidraw feel — default presets. For a custom color, pass a hex directly) ============ */
const PALETTE={ yellow:"#ffec99", blue:"#d0ebff", green:"#b2f2bb", orange:"#ffd8a8", red:"#ffc9c9" };
// Dark mode: ?mode=dark → ink (outline/label/arrow/text) and background switch. Box pastel fills are shared across both modes.
// Note: a hachure fill shows the background color between strokes, so labels & outlines must switch with the background to stay readable. In light mode everything is #1e1e1e, so the output is identical.
const DARK = new URLSearchParams(location.search).get('mode')==='dark';
const INK   = DARK ? "#ececec" : "#1e1e1e";   // outline/label/arrow/text (switches with mode)
const STROKE= INK, LABEL = INK;               // (outline/label = ink)
const RED   = DARK ? "#ff8787" : "#e03131";
const BG    = DARK ? "#1b1b1f" : "#fffdf7";

/* ============ KIT: helpers — usually don't touch ============ */
function txt(x,y,s,o={}){
  const {size=24,color=INK,anchor="middle",rot=0}=o;
  const t=document.createElementNS(svgns,"text");
  t.setAttribute("x",x);t.setAttribute("y",y);
  t.setAttribute("font-family","'Nanum Pen Script', cursive");
  t.setAttribute("font-size",size);t.setAttribute("fill",color);
  t.setAttribute("text-anchor",anchor);
  if(rot)t.setAttribute("transform",`rotate(${rot} ${x} ${y})`);
  t.textContent=s;svg.appendChild(t);
}
function boxLabel(cx,cy,lines,o={}){
  const {size=23,color=LABEL}=o;const lh=size*0.95;
  const startY=cy-((lines.length-1)*lh)/2+size*0.30;
  lines.forEach((ln,i)=>txt(cx,startY+i*lh,ln,{size,color}));
}
// box(x,y,w,h, fill, ["line1","line2",...], {labelSize, labelColor, stroke})
function box(x,y,w,h,fill,lines,o={}){
  svg.appendChild(rc.rectangle(x,y,w,h,{roughness:1.7,stroke:o.stroke||STROKE,strokeWidth:2,fill,fillStyle:"hachure",fillWeight:1.35,hachureGap:6}));
  boxLabel(x+w/2,y+h/2,lines,{size:o.labelSize||23,color:o.labelColor||LABEL});
}
// frame(x,y,w,h, {dash:[8,7], stroke, sw}) — unfilled group border
function frame(x,y,w,h,o={}){
  svg.appendChild(rc.rectangle(x,y,w,h,{roughness:1.4,stroke:o.stroke||INK,strokeWidth:o.sw||2,strokeLineDash:o.dash||undefined}));
}
// cylinder(x,y,w,h, fill, lines, {labelSize, stroke}) — DB / storage
function cylinder(x,y,w,h,fill,lines,o={}){
  const cx=x+w/2, ry=Math.min(h*0.16,20), stroke=o.stroke||STROKE;
  const fillO={roughness:1.5,stroke:"none",fill,fillStyle:"hachure",fillWeight:1.2,hachureGap:6};
  svg.appendChild(rc.rectangle(x,y+ry,w,h-2*ry,fillO));                 // body fill (no stroke)
  svg.appendChild(rc.ellipse(cx,y+h-ry,w,2*ry,fillO));                  // bottom cap fill (prevents the gap under the curve)
  svg.appendChild(rc.ellipse(cx,y+ry,w,2*ry,{...fillO,stroke,strokeWidth:2})); // top face
  svg.appendChild(rc.line(x,y+ry,x,y+h-ry,{roughness:1.3,stroke,strokeWidth:2}));     // left side
  svg.appendChild(rc.line(x+w,y+ry,x+w,y+h-ry,{roughness:1.3,stroke,strokeWidth:2})); // right side
  svg.appendChild(rc.arc(cx,y+h-ry,w,2*ry,0,Math.PI,false,{roughness:1.3,stroke,strokeWidth:2})); // bottom curve
  boxLabel(cx,y+h*0.56,lines,{size:o.labelSize||21,color:o.labelColor||LABEL});
}
// diamond(cx,cy,w,h, fill, lines, {labelSize, stroke}) — branch / decision
function diamond(cx,cy,w,h,fill,lines,o={}){
  svg.appendChild(rc.polygon([[cx,cy-h/2],[cx+w/2,cy],[cx,cy+h/2],[cx-w/2,cy]],{roughness:1.6,stroke:o.stroke||STROKE,strokeWidth:2,fill,fillStyle:"hachure",fillWeight:1.3,hachureGap:6}));
  boxLabel(cx,cy,lines,{size:o.labelSize||21,color:o.labelColor||LABEL});
}
// ellipse(cx,cy,w,h, fill, lines?, {labelSize, stroke}) — node / circle
function ellipse(cx,cy,w,h,fill,lines,o={}){
  svg.appendChild(rc.ellipse(cx,cy,w,h,{roughness:1.6,stroke:o.stroke||STROKE,strokeWidth:2,fill,fillStyle:"hachure",fillWeight:1.3,hachureGap:6}));
  if(lines) boxLabel(cx,cy,lines,{size:o.labelSize||21,color:o.labelColor||LABEL});
}
function aHead(x2,y2,ang,opt){
  const len=13,sp=0.45;
  svg.appendChild(rc.line(x2,y2,x2+len*Math.cos(ang+Math.PI-sp),y2+len*Math.sin(ang+Math.PI-sp),opt));
  svg.appendChild(rc.line(x2,y2,x2+len*Math.cos(ang+Math.PI+sp),y2+len*Math.sin(ang+Math.PI+sp),opt));
}
// line(x1,y1,x2,y2, {stroke, sw, dash:[6,7]}) — connector / divider, no arrowhead
function line(x1,y1,x2,y2,o={}){
  svg.appendChild(rc.line(x1,y1,x2,y2,{roughness:1.4,stroke:o.stroke||INK,strokeWidth:o.sw||2,strokeLineDash:o.dash||undefined}));
}
// arrow(x1,y1,x2,y2, {stroke, sw, dash:[6,7]}) — one-way arrow
function arrow(x1,y1,x2,y2,o={}){
  const opt={roughness:1.5,stroke:o.stroke||INK,strokeWidth:o.sw||2,strokeLineDash:o.dash||undefined};
  svg.appendChild(rc.line(x1,y1,x2,y2,opt));
  aHead(x2,y2,Math.atan2(y2-y1,x2-x1),opt);
}
// biArrow(...) — two-way
function biArrow(x1,y1,x2,y2,o={}){
  const opt={roughness:1.4,stroke:o.stroke||INK,strokeWidth:o.sw||3};
  svg.appendChild(rc.line(x1,y1,x2,y2,opt));
  aHead(x2,y2,Math.atan2(y2-y1,x2-x1),opt);
  aHead(x1,y1,Math.atan2(y1-y2,x1-x2),opt);
}
// curveArrow([[x,y],[x,y],...], {stroke, sw, dash}) — curved arrow through points (self-loop / detour edge); arrowhead at the last point.
function curveArrow(pts,o={}){
  const opt={roughness:1.3,stroke:o.stroke||INK,strokeWidth:o.sw||2,strokeLineDash:o.dash||undefined};
  svg.appendChild(rc.curve(pts,opt));
  const n=pts.length, a=Math.atan2(pts[n-1][1]-pts[n-2][1],pts[n-1][0]-pts[n-2][0]);
  aHead(pts[n-1][0],pts[n-1][1],a,opt);
}
// xmark(cx,cy,r, {stroke, sw}) — small X at a point (mark a cut link)
function xmark(cx,cy,r,o={}){
  const opt={roughness:1.8,stroke:o.stroke||RED,strokeWidth:o.sw||4};
  svg.appendChild(rc.line(cx-r,cy-r,cx+r,cy+r,opt));
  svg.appendChild(rc.line(cx+r,cy-r,cx-r,cy+r,opt));
}
// crossOut(x,y,w,h, {stroke, sw, pad}) — big X over a whole region (the "removed" in before/after)
function crossOut(x,y,w,h,o={}){
  const p=o.pad??10, opt={roughness:2.3,stroke:o.stroke||RED,strokeWidth:o.sw||5};
  svg.appendChild(rc.line(x-p,y-p,x+w+p,y+h+p,opt));
  svg.appendChild(rc.line(x+w+p,y-p,x-p,y+h+p,opt));
}

function draw(){
  rc=rough.svg(svg);

  /* ======================================================== *
   *  replace below — the rest is a helper demo (delete it, draw your own)  *
   * ======================================================== */
  txt(560,52,"Title — handdrawn diagram template",{size:30});

  // --- box · frame · arrow ---
  frame(80,92,960,140,{dash:[8,7],stroke:"#2471a3"});
  txt(98,86,"frame = dashed group border",{size:17,anchor:"start",color:"#1b4f72"});
  box(110,122,200,78,PALETTE.yellow,["Box A","box(x,y,w,h,fill,lines)"]);
  box(460,122,200,78,PALETTE.blue,["Box B","multi-line = array"]);
  box(810,122,200,78,PALETTE.green,["Box C"]);
  arrow(310,161,460,161); txt(385,153,"arrow",{size:16,color:"#666"});
  biArrow(660,161,810,161); txt(735,153,"biArrow",{size:16,color:"#666"});

  // --- shapes: cylinder · diamond · ellipse ---
  txt(80,300,"Shapes:",{size:20,anchor:"start",color:"#555"});
  cylinder(110,310,150,110,PALETTE.blue,["DB","Postgres"]);
  diamond(470,365,180,120,PALETTE.yellow,["Branch?","decision"]);
  ellipse(770,365,160,96,PALETTE.green,["Node","ellipse/circle"]);
  box(960,325,120,80,PALETTE.orange,["Emphasis"]);
  line(260,365,380,365,{dash:[6,6]});   // connector, no arrowhead
  arrow(560,365,690,365);
  arrow(850,365,960,365);

  // --- emphasis: xmark(point) · crossOut(region) ---
  xmark(120,520,13); txt(148,527,"xmark = dot X (cut a link)",{size:18,anchor:"start",color:RED});
  box(560,490,160,66,PALETTE.red,["Panel to remove"]); crossOut(560,490,160,66);
  txt(745,527,"crossOut(x,y,w,h) = strike a whole region (before/after)",{size:18,anchor:"start",color:RED});
  txt(560,628,"Default palette: PALETTE.yellow · blue · green · orange · red — or pass a hex directly",{size:20});
  txt(560,664,"Connect: line · arrow · biArrow · curveArrow   Shapes: box · cylinder · diamond · ellipse   Emphasis: xmark · crossOut",{size:17});
  /* ======================== end replace ======================== */

  document.getElementById("flag").textContent="DIAGRAM-READY";
}

window.addEventListener("load",async()=>{
  try{
    // wait for fonts — without this you capture the fallback (flat sans). If draw() uses text over 40px, add that size too.
    await document.fonts.load("24px 'Nanum Pen Script'");
    await document.fonts.load("40px 'Nanum Pen Script'");
    await document.fonts.ready;
  }catch(e){}
  document.body.style.background=BG; svg.style.background=BG;   // dark-mode background
  draw();
});
</script>
</body>
</html>
